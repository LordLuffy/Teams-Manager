name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Teams Manager ${{ github.ref_name }}'
          releaseBody: |
            Application desktop **Windows** dédiée à l'audit des licences Microsoft 365 et des ressources de téléphonie Teams, sans passer par le portail d'administration Microsoft.


            ## 📑 Onglets disponibles

            ### ☎️ Téléphonie
            - **Tous les utilisateurs** — annuaire complet des utilisateurs Azure AD
            - **Utilisateurs** — utilisateurs disposant d'un numéro de téléphone Teams actif
            - **Numéros libres** — inventaire des numéros PSTN non assignés dans le tenant
            - **Utilisateurs sans numéro** — utilisateurs avec licence téléphonie mais sans numéro attribué

            ### 📦 Licences
            - **Licences utilisateurs** — détail des licences Microsoft 365 par utilisateur
            - **Abonnements** — vue globale des abonnements du tenant (quantités et consommation)

            ### 🧩 Ressources
            - **Files d'attente** — liste des Call Queues Teams (via PowerShell MicrosoftTeams)
            - **Standards automatiques** — liste des Auto Attendants (via PowerShell MicrosoftTeams)
            - **Comptes ressources** — comptes de type MCOEV\_VIRTUALUSER
            - **Cartographie** — vue consolidée des relations entre numéros, comptes ressources et files d'attente

            ## ⚙️ Fonctionnalités

            - 🔐 **Authentification Microsoft** via Device Code Flow (aucun mot de passe stocké)
            - 🔑 **Stockage sécurisé** des identifiants et tokens dans le Gestionnaire d'identification Windows
            - 📤 **Export CSV** disponible dans chaque onglet
            - 🧾 **Logs applicatifs** avec chemin personnalisable
            - 🔄 **Mise à jour automatique** signée via GitHub Releases
            - 🔎 **Vérification manuelle** des mises à jour depuis la sidebar


            N'hésitez pas à remonter vos retours via les [Issues GitHub](https://github.com/LordLuffy/Teams-Manager/issues) pour améliorer les prochaines versions.
          releaseDraft: false
          prerelease: false
