name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Teams Manager ${{ github.ref_name }}'
          releaseBody: |
            ## Teams Manager v1.0.0 — Première version publique

            Application desktop Windows pour auditer les licences Microsoft 365 et les ressources de téléphonie Teams, sans passer par le portail d'administration.

            ### Onglets disponibles

            **Téléphonie**
            - **Tous les utilisateurs** — annuaire complet des utilisateurs Azure AD
            - **Utilisateurs** — utilisateurs avec un numéro de téléphone Teams assigné
            - **Numéros libres** — numéros PSTN non assignés dans le tenant
            - **Utilisateurs sans numéro** — utilisateurs avec une licence téléphonie mais sans numéro

            **Licences**
            - **Licences utilisateurs** — détail des licences Microsoft 365 par utilisateur
            - **Abonnements** — inventaire des abonnements du tenant (quantités, consommation)

            **Ressources**
            - **Files d'attente** — liste des call queues Teams (via PowerShell MicrosoftTeams)
            - **Standards automatiques** — liste des auto attendants (via PowerShell MicrosoftTeams)
            - **Comptes ressources** — comptes de ressources MCOEV_VIRTUALUSER
            - **Cartographie** — vue consolidée des liaisons numéros / comptes ressources / files d'attente

            ### Fonctionnalités générales

            - Authentification Microsoft via device code flow (aucun mot de passe stocké)
            - Identifiants et tokens stockés dans le Gestionnaire d'informations d'identification Windows (chiffré)
            - Export CSV dans chaque onglet
            - Logs applicatifs avec chemin personnalisable
            - Mise à jour automatique signée via GitHub Releases
            - Vérification manuelle des mises à jour depuis la sidebar
          releaseDraft: false
          prerelease: false
