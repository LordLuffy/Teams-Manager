name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Teams Manager ${{ github.ref_name }}'
          releaseBody: |
            A Windows desktop application designed to audit Microsoft 365 licenses and Teams telephony resources without going through the Microsoft admin portal.


            ## 📑 Available tabs

            ### ☎️ Telephony
            - **All users** — complete directory of Azure AD users
            - **Users** — users with an active Teams phone number
            - **Unassigned numbers** — list of unassigned PSTN numbers in the tenant
            - **Users without a number** — users with a telephony license but without an assigned number

            ### 📦 Licenses
            - **User licenses** — details of Microsoft 365 licenses per user
            - **Subscriptions** — overview of tenant subscriptions (quantities and usage)

            ### 🧩 Resources
            - **Call queues** — list of Teams call queues (via Microsoft Teams PowerShell)
            - **Auto attendants** — list of auto attendants (via Microsoft Teams PowerShell)
            - **Resource accounts** — accounts of type MCOEV\_VIRTUALUSER
            - **Mapping** — consolidated view of the relationships between numbers, resource accounts, and queues

            ## ⚙️ Features

            - 🔐 **Microsoft Authentication** via Device Code Flow (no passwords stored)
            - 🔑 **Secure storage** of credentials and tokens in Windows Identity Manager
            - 📤 **CSV export** available in each tab
            - 🧾 **Application logs** with customizable path
            - 🔄 **Automatic updates** signed via GitHub Releases
            - 🔎 **Manual check** for updates from the sidebar


            Please feel free to submit your feedback via [GitHub Issues](https://github.com/LordLuffy/Teams-Manager/issues) to help improve future versions.
          releaseDraft: false
          prerelease: false
